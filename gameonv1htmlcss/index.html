<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameOn! HTML CSS</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <div class="container">
            <!-- sidebar -->
             <aside class="sidebar">
                <h2>Breaking ICE</h2>
                <div class="instructions">
                    <h3>Instructions!</h3>
                    <ul>
                        <li>Roll the ice blocks</li>
                        <li>Add points</li>
                        <li>Avoid losing your score</li>
                        <li>First to 20 wins</li>
                    </ul>
                </div>
            </aside>

            <!-- main game area -->
            <section class="game-area">
                <h2 class="title">Roll the Ice?</h2>
                <div class="players">

                    <!-- player 1 -->
                    <div class="player">
                        <h3>Player 1</h3>

                        <!-- change the avatars to the penguins later -->
                        <div class="avatar">
                        </div>

                        <!-- change the scores into js later -->
                        <div class="score">
                        </div>

                        <button class="roll">Roll</button>
                        <button class="pass">Pass</button>
                    </div>

                    <!-- dice -->
                    <div class="dice">
                        <img src="ice-dice.png" alt="dice">
                    </div>

                    <!-- player 2 -->
                    <div class="player">
                        <h3>Player 2</h3>

                        <!-- change the avatars to the penguins later -->
                        <div class="avatar">
                        </div>
                        <!-- change the scores into js later -->
                        <div class="score">
                        </div>

                        <button class="roll">Roll</button>
                        <button class="pass">Pass</button>
                    </div>

                </div>

            </section>

        </div>
    </main>

</body>
</html>
